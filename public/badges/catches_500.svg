<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4D4D4"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E2430"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-color="#C0C0C0" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#C0C0C0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C0C0C0" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
  <circle cx="60" cy="60" r="53" fill="url(#bgGrad)"/>
  <circle cx="60" cy="60" r="53" fill="url(#innerGlow)"/>
  <g filter="url(#iconShadow)">
    <!-- Fish 1 - upper right, swimming left -->
    <path d="M78,42 Q70,36 60,38 Q52,40 46,46 Q52,48 60,48 Q70,48 78,42 Z" fill="none" stroke="#C0C0C0" stroke-width="2" stroke-linejoin="round"/>
    <path d="M78,42 L84,36 Q82,42 84,48 Z" fill="none" stroke="#C0C0C0" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="52" cy="42" r="1.5" fill="#C0C0C0"/>
    <!-- Fish 2 - lower left, swimming right -->
    <path d="M42,78 Q50,84 60,82 Q68,80 74,74 Q68,72 60,72 Q50,72 42,78 Z" fill="none" stroke="#C0C0C0" stroke-width="2" stroke-linejoin="round"/>
    <path d="M42,78 L36,84 Q38,78 36,72 Z" fill="none" stroke="#C0C0C0" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="68" cy="78" r="1.5" fill="#C0C0C0"/>
    <!-- Connecting flow lines (yin-yang feeling) -->
    <path d="M46,46 Q38,54 38,60 Q38,66 42,72" fill="none" stroke="#C0C0C0" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
    <path d="M74,74 Q82,66 82,60 Q82,54 78,48" fill="none" stroke="#C0C0C0" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="60" cy="60" r="2" fill="none" stroke="#C0C0C0" stroke-width="1" stroke-opacity="0.3"/>
  </g>
</svg>
