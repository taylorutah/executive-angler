<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2332"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4874D"/>
      <stop offset="50%" stop-color="#E8923A"/>
      <stop offset="100%" stop-color="#B06B2A"/>
    </linearGradient>
    <linearGradient id="fish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8923A"/>
      <stop offset="100%" stop-color="#C77A2E"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8923A"/>
      <stop offset="100%" stop-color="#F0A855"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="60" cy="60" r="53" fill="none" stroke="#E8923A" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#glow)">
    <!-- Fish body -->
    <path d="M30,58 Q40,42 58,40 Q72,40 84,50 Q90,56 90,60 Q90,64 84,70 Q72,80 58,80 Q40,78 30,62 Z" fill="url(#fish)" opacity="0.9"/>
    <!-- Belly highlight -->
    <path d="M40,62 Q50,72 66,72 Q78,70 84,64 Q78,74 66,76 Q50,76 40,66 Z" fill="url(#belly)" opacity="0.3"/>
    <!-- Tail -->
    <path d="M30,58 L20,46 Q24,54 22,62 Q24,66 20,74 L30,62 Z" fill="#C77A2E" opacity="0.8"/>
    <!-- Dorsal fin -->
    <path d="M56,40 L50,30 Q58,32 64,36 L66,40" fill="#C77A2E" opacity="0.7"/>
    <!-- Pectoral fin -->
    <path d="M62,64 L56,74 Q60,72 64,68" fill="#B06B2A" opacity="0.5"/>
    <!-- Eye -->
    <circle cx="78" cy="56" r="4" fill="#F0F6FC"/>
    <circle cx="79" cy="55.5" r="2" fill="#0D1117"/>
    <circle cx="80" cy="54.5" r="0.8" fill="#F0F6FC"/>
    <!-- Gill line -->
    <path d="M72,50 Q70,58 72,66" fill="none" stroke="#B06B2A" stroke-width="1.5" opacity="0.5"/>
    <!-- Scale pattern -->
    <circle cx="50" cy="55" r="3" fill="none" stroke="#C77A2E" stroke-width="0.5" opacity="0.3"/>
    <circle cx="56" cy="60" r="3" fill="none" stroke="#C77A2E" stroke-width="0.5" opacity="0.3"/>
    <circle cx="44" cy="60" r="3" fill="none" stroke="#C77A2E" stroke-width="0.5" opacity="0.3"/>
    <circle cx="62" cy="55" r="3" fill="none" stroke="#C77A2E" stroke-width="0.5" opacity="0.3"/>
    <!-- Mouth -->
    <path d="M88,58 L90,60" stroke="#B06B2A" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Number badge -->
  <circle cx="88" cy="88" r="14" fill="#E8923A"/>
  <circle cx="88" cy="88" r="12" fill="none" stroke="#0D1117" stroke-width="1.5"/>
  <text x="88" y="92.5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="12" fill="#0D1117">100</text>
</svg>