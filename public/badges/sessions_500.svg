<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1E2E"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E8F0"/>
      <stop offset="25%" stop-color="#B8C0D0"/>
      <stop offset="50%" stop-color="#E8E8F0"/>
      <stop offset="75%" stop-color="#9AA0B0"/>
      <stop offset="100%" stop-color="#E8E8F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E0EC"/>
      <stop offset="50%" stop-color="#B0B8C8"/>
      <stop offset="100%" stop-color="#D8D8E8"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
