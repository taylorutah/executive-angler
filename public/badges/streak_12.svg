<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2215"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C8A800"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#E8923A"/>
      <stop offset="100%" stop-color="#DA3633"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE899"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8923A"/>
    </linearGradient>
    <linearGradient id="flame3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.25"/>
  <g filter="url(#glow)">
    <!-- Outer flame -->
    <path d="M60,16 Q72,32 78,48 Q84,60 80,72 Q76,82 70,88 Q66,92 60,94 Q54,92 50,88 Q44,82 40,72 Q36,60 42,48 Q48,32 60,16 Z" fill="url(#flame1)" opacity="0.85"/>
    <!-- Middle flame -->
    <path d="M60,30 Q70,44 74,54 Q78,64 74,74 Q70,80 66,84 Q64,86 60,86 Q56,86 54,84 Q50,80 46,74 Q42,64 46,54 Q50,44 60,30 Z" fill="url(#flame2)" opacity="0.7"/>
    <!-- Inner flame -->
    <path d="M60,44 Q68,54 70,62 Q72,70 68,76 Q66,80 60,82 Q54,80 52,76 Q48,70 50,62 Q52,54 60,44 Z" fill="url(#flame3)" opacity="0.6"/>
    <!-- White hot core -->
    <path d="M60,56 Q64,62 64,68 Q64,74 60,78 Q56,74 56,68 Q56,62 60,56 Z" fill="#FFFEF0" opacity="0.5"/>
    <!-- Left tongue -->
    <path d="M42,48 Q36,36 38,24" fill="none" stroke="#E8923A" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Right tongue -->
    <path d="M78,48 Q84,36 82,24" fill="none" stroke="#E8923A" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Ember particles -->
    <circle cx="44" cy="28" r="2" fill="#FFD700" opacity="0.5"/>
    <circle cx="76" cy="26" r="1.5" fill="#FFD700" opacity="0.4"/>
    <circle cx="38" cy="40" r="1.2" fill="#E8923A" opacity="0.4"/>
    <circle cx="82" cy="38" r="1.2" fill="#E8923A" opacity="0.4"/>
    <circle cx="48" cy="22" r="1" fill="#FFE066" opacity="0.3"/>
    <circle cx="72" cy="20" r="1" fill="#FFE066" opacity="0.3"/>
  </g>
  <circle cx="88" cy="88" r="14" fill="#FFD700"/>
  <circle cx="88" cy="88" r="12" fill="none" stroke="#0D1117" stroke-width="1.5"/>
  <text x="88" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="13" fill="#0D1117">12</text>
</svg>