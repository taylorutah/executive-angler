<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#C9A200"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E2430"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-color="#FFD700" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
  <circle cx="60" cy="60" r="53" fill="url(#bgGrad)"/>
  <circle cx="60" cy="60" r="53" fill="url(#innerGlow)"/>
  <g filter="url(#iconShadow)">
    <!-- Main flame outer shape -->
    <path d="M60,22 Q68,36 72,48 Q76,58 74,68 Q72,78 66,84 Q62,88 60,90 Q58,88 54,84 Q48,78 46,68 Q44,58 48,48 Q52,36 60,22 Z" fill="none" stroke="#FFD700" stroke-width="2" stroke-linejoin="round"/>
    <!-- Inner flame -->
    <path d="M60,38 Q66,48 68,56 Q70,64 66,72 Q64,76 60,80 Q56,76 54,72 Q50,64 52,56 Q54,48 60,38 Z" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round"/>
    <!-- Core flame -->
    <path d="M60,52 Q64,58 64,64 Q64,70 60,74 Q56,70 56,64 Q56,58 60,52 Z" fill="none" stroke="#FFD700" stroke-width="1.2" stroke-opacity="0.4"/>
    <!-- Left tongue -->
    <path d="M48,48 Q42,40 44,32 Q46,38 50,44" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
    <!-- Right tongue -->
    <path d="M72,48 Q78,40 76,32 Q74,38 70,44" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
    <!-- "12" subtly in the flame base -->
    <!-- The 1 -->
    <line x1="55" y1="78" x2="55" y2="86" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
    <line x1="53" y1="80" x2="55" y2="78" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.5"/>
    <!-- The 2 -->
    <path d="M59,78 Q63,78 63,81 Q63,83 59,86 L63,86" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <!-- Ember particles -->
    <circle cx="48" cy="36" r="1.2" fill="#FFD700" opacity="0.4"/>
    <circle cx="72" cy="34" r="1" fill="#FFD700" opacity="0.3"/>
    <circle cx="44" cy="44" r="0.8" fill="#FFD700" opacity="0.3"/>
    <circle cx="76" cy="42" r="0.8" fill="#FFD700" opacity="0.3"/>
  </g>
</svg>
