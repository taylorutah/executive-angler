<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D99A5B"/>
      <stop offset="100%" stop-color="#A5611E"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E2430"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-color="#CD7F32" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#CD7F32" stop-opacity="0"/>
      <stop offset="100%" stop-color="#CD7F32" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
  <circle cx="60" cy="60" r="53" fill="url(#bgGrad)"/>
  <circle cx="60" cy="60" r="53" fill="url(#innerGlow)"/>
  <g filter="url(#iconShadow)">
    <!-- Meandering river S-curve -->
    <path d="M50,24 Q72,32 72,44 Q72,56 48,60 Q28,64 28,76 Q28,88 50,96" fill="none" stroke="#CD7F32" stroke-width="3" stroke-linecap="round"/>
    <!-- River banks (parallel offset paths) -->
    <path d="M44,24 Q66,32 66,44 Q66,54 44,58 Q24,62 24,74 Q24,86 44,94" fill="none" stroke="#CD7F32" stroke-width="1" stroke-opacity="0.3" stroke-linecap="round"/>
    <path d="M56,24 Q78,32 78,44 Q78,58 52,62 Q32,66 32,78 Q32,90 56,98" fill="none" stroke="#CD7F32" stroke-width="1" stroke-opacity="0.3" stroke-linecap="round"/>
    <!-- Waypoint dots along the river -->
    <circle cx="52" cy="28" r="3" fill="none" stroke="#CD7F32" stroke-width="1.5"/>
    <circle cx="52" cy="28" r="1" fill="#CD7F32"/>
    <circle cx="68" cy="44" r="3" fill="none" stroke="#CD7F32" stroke-width="1.5"/>
    <circle cx="68" cy="44" r="1" fill="#CD7F32"/>
    <circle cx="48" cy="60" r="3" fill="none" stroke="#CD7F32" stroke-width="1.5"/>
    <circle cx="48" cy="60" r="1" fill="#CD7F32"/>
    <circle cx="32" cy="76" r="3" fill="none" stroke="#CD7F32" stroke-width="1.5"/>
    <circle cx="32" cy="76" r="1" fill="#CD7F32"/>
    <circle cx="48" cy="92" r="3" fill="none" stroke="#CD7F32" stroke-width="1.5"/>
    <circle cx="48" cy="92" r="1" fill="#CD7F32"/>
  </g>
</svg>
