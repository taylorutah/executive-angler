    <rect x="26" y="80" width="12" height="5" rx="2" fill="#B8962E" transform="rotate(-48, 32, 82)"/>
    <rect x="24" y="83" width="8" height="4" rx="2" fill="#8B7225" transform="rotate(-48, 28, 85)"/>
    <circle cx="36" cy="78" r="5.5" fill="url(#metal)" stroke="#C8A800" stroke-width="1"/>
    <circle cx="36" cy="78" r="2" fill="#2A2215"/>
    <circle cx="50" cy="64" r="1.5" fill="none" stroke="#FFE899" stroke-width="1"/>
    <circle cx="60" cy="52" r="1.5" fill="none" stroke="#FFE899" stroke-width="1"/>
    <circle cx="70" cy="40" r="1.2" fill="none" stroke="#FFE899" stroke-width="0.8"/>
    <path d="M82,30 Q90,26 88,36 Q86,44 80,48" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
    <path d="M80,48 Q78,52 76,50 Q74,48 76,46" fill="none" stroke="#FFE899" stroke-width="1.2" stroke-linecap="round"/>
