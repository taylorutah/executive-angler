<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132030"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40C4E0"/>
      <stop offset="50%" stop-color="#0BA5C7"/>
      <stop offset="100%" stop-color="#0886A0"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#40C4E0"/>
      <stop offset="40%" stop-color="#0BA5C7"/>
      <stop offset="100%" stop-color="#087F99"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7DD8EC"/>
      <stop offset="100%" stop-color="#0BA5C7"/>
    </linearGradient>
    <linearGradient id="flame3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#B8ECFA"/>
      <stop offset="100%" stop-color="#40C4E0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="60" cy="60" r="53" fill="none" stroke="#0BA5C7" stroke-width="0.5" opacity="0.3"/>
  <g filter="url(#glow)">
    <!-- Outer flame -->
    <path d="M60,18 Q70,34 76,48 Q82,60 78,72 Q74,82 68,88 Q64,92 60,94 Q56,92 52,88 Q46,82 42,72 Q38,60 44,48 Q50,34 60,18 Z" fill="url(#flame1)" opacity="0.85"/>
    <!-- Middle flame -->
    <path d="M60,32 Q68,44 72,54 Q76,64 72,74 Q68,80 64,84 Q62,86 60,86 Q58,86 56,84 Q52,80 48,74 Q44,64 48,54 Q52,44 60,32 Z" fill="url(#flame2)" opacity="0.7"/>
    <!-- Inner flame -->
    <path d="M60,46 Q66,54 68,62 Q70,70 66,76 Q64,80 60,82 Q56,80 54,76 Q50,70 52,62 Q54,54 60,46 Z" fill="url(#flame3)" opacity="0.6"/>
    <!-- Core -->
    <path d="M60,58 Q64,64 64,70 Q64,76 60,78 Q56,76 56,70 Q56,64 60,58 Z" fill="#E0F4FA" opacity="0.5"/>
    <!-- Left tongue -->
    <path d="M44,48 Q38,38 40,28" fill="none" stroke="#0BA5C7" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Right tongue -->
    <path d="M76,48 Q82,38 80,28" fill="none" stroke="#0BA5C7" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Ember particles -->
    <circle cx="46" cy="32" r="1.5" fill="#40C4E0" opacity="0.5"/>
    <circle cx="74" cy="30" r="1.2" fill="#40C4E0" opacity="0.4"/>
    <circle cx="40" cy="42" r="1" fill="#40C4E0" opacity="0.3"/>
    <circle cx="80" cy="40" r="1" fill="#40C4E0" opacity="0.3"/>
  </g>
  <circle cx="88" cy="88" r="14" fill="#0BA5C7"/>
  <circle cx="88" cy="88" r="12" fill="none" stroke="#0D1117" stroke-width="1.5"/>
  <text x="88" y="93" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="14" fill="#FFFFFF">4</text>
</svg>