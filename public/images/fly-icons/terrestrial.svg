<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Terrestrial silhouette: foam hopper/ant profile -->
  <g fill="#E8923A" opacity="0.9">
    <!-- Foam body segments -->
    <ellipse cx="28" cy="40" rx="10" ry="5" fill="#E8923A" opacity="0.5"/>
    <ellipse cx="48" cy="38" rx="8" ry="5.5" fill="#E8923A" opacity="0.6"/>
    <!-- Head -->
    <circle cx="58" cy="37" r="4" fill="#E8923A" opacity="0.7"/>
    <!-- Eye -->
    <circle cx="59.5" cy="36" r="1" fill="#0D1117" opacity="0.5"/>
    <!-- Rubber legs (splayed) -->
    <path d="M34 42 L28 54 L24 58" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M36 42 L34 54 L32 58" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M44 40 L40 52 L36 56" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M46 40 L46 52 L44 56" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M52 39 L54 50 L56 54" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M54 38 L58 48 L62 52" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <!-- Indicator post -->
    <path d="M40 36 L38 24 L42 24 L40 36" fill="#E8923A" opacity="0.35"/>
    <!-- Hook -->
    <path d="M58 37 Q64 40 62 46 Q60 50 56 48" stroke="#E8923A" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M56 48 L54 44" stroke="#E8923A" stroke-width="1" opacity="0.4"/>
    <!-- Tail/body extension -->
    <path d="M18 42 Q14 44 12 42 Q14 40 18 40" fill="#E8923A" opacity="0.3"/>
  </g>
</svg>