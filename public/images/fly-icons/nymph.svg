<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Nymph silhouette: beadhead nymph profile -->
  <g fill="#E8923A" opacity="0.9">
    <!-- Bead head -->
    <circle cx="60" cy="40" r="5" fill="#E8923A" opacity="0.8"/>
    <!-- Hook shank + body -->
    <path d="M18 48 Q22 44 36 42 Q48 40 55 40" stroke="#E8923A" stroke-width="2" fill="none"/>
    <!-- Segmented abdomen -->
    <ellipse cx="30" cy="44" rx="10" ry="3.5" opacity="0.6"/>
    <path d="M22 44 L24 44 M26 43.5 L28 43.5 M30 43 L32 43 M34 42.5 L36 42.5" stroke="#E8923A" stroke-width="0.6" opacity="0.4"/>
    <!-- Thorax (thicker) -->
    <ellipse cx="48" cy="40.5" rx="8" ry="4.5" opacity="0.5"/>
    <!-- Legs -->
    <path d="M44 41 L40 50 M47 40.5 L44 50 M50 40 L48 49" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
    <!-- Tail fibers -->
    <path d="M18 48 L10 44 M18 48 L10 48 M18 48 L12 52" stroke="#E8923A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
    <!-- Wing case -->
    <path d="M44 38 Q48 36 52 38" stroke="#E8923A" stroke-width="1.2" fill="none" opacity="0.5"/>
    <!-- Hook bend -->
    <path d="M18 48 Q14 52 16 56 Q18 58 22 56" stroke="#E8923A" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Hook point -->
    <path d="M22 56 L24 52" stroke="#E8923A" stroke-width="1" opacity="0.5"/>
  </g>
</svg>